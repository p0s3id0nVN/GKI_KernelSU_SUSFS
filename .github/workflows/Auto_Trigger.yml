name: 🚀 Tự động kích hoạt khi SukiSU cập nhật

on:
  schedule:
    - cron: '0 0 */3 * *'  # Chạy mỗi 3 ngày một lần
  workflow_dispatch:     # Cho phép chạy thủ công

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    # Nếu muốn chạy tự động, vui lòng thêm/sửa tên người dùng chủ sở hữu repo
    if: contains(fromJSON('["zzh20188", "elysias123"]'), github.repository_owner)
    steps:
      - name: 📥 Checkout mã nguồn
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: 🔍 Lấy SHA commit mới nhất từ SukiSU-Ultra
        id: get_sha
        run: |
          LATEST_SHA=$(curl -s https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/commits/main | jq -r '.sha')
          echo "sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "SHA mới nhất: $LATEST_SHA"
          
      - name: 🕰️ Lấy SHA cũ từ nhánh sha
        id: get_prev_sha
        run: |

          if git ls-remote --heads origin sha | grep -q sha; then
            echo "Đã tồn tại nhánh SHA, đang lấy SHA cũ..."
            git fetch origin sha:sha || true
            git checkout sha || true
            if [ -f "latest_sha.txt" ]; then
              PREV_SHA=$(cat latest_sha.txt)
              echo "prev_sha=$PREV_SHA" >> $GITHUB_OUTPUT
              echo "Đã tìm thấy SHA cũ: $PREV_SHA"
            else
              echo "prev_sha=" >> $GITHUB_OUTPUT
              echo "Không tìm thấy file SHA cũ"
            fi
          else
            echo "prev_sha=" >> $GITHUB_OUTPUT
            echo "Nhánh SHA chưa tồn tại"
          fi

          git checkout ${{ github.ref_name }}
          
      - name: ⚖️ So sánh với SHA cũ
        id: compare
        run: |
          CURR_SHA="${{ steps.get_sha.outputs.sha }}"
          PREV_SHA="${{ steps.get_prev_sha.outputs.prev_sha }}"
          
          echo "SHA hiện tại: $CURR_SHA"
          echo "SHA cũ: $PREV_SHA"
          
          if [ "$CURR_SHA" != "$PREV_SHA" ]; then
            echo "new_commit=true" >> $GITHUB_OUTPUT
            echo "Phát hiện commit mới!"
          else
            echo "new_commit=false" >> $GITHUB_OUTPUT
            echo "Không có commit nào mới"
          fi
          
      - name: 📝 Cập nhật file SHA vào nhánh sha
        if: steps.compare.outputs.new_commit == 'true'
        run: |

          git checkout sha 2>/dev/null || git checkout --orphan sha
          

          if [ ! -f "latest_sha.txt" ]; then
            git rm -rf . 2>/dev/null || true
          fi

          echo "${{ steps.get_sha.outputs.sha }}" > latest_sha.txt
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add latest_sha.txt
          git commit -m "Cập nhật SHA mới nhất của SukiSU thành ${{ steps.get_sha.outputs.sha }}" || exit 0
          git push origin sha