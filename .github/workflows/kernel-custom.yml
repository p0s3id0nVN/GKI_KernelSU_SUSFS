name: 🛠️ Build Kernel Android - Tùy chỉnh

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== Cấu hình phiên bản ====================
      android_version:
        description: "📱 Phiên bản Android"
        required: true
        type: choice
        options:
          - android12
          - android13
          - android14
          - android15
          - android16
        default: android12
      kernel_version:
        description: "🐧 Phiên bản Kernel"
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
        default: "5.10"
      sub_level:
        description: "🔢 Số phiên bản phụ (Ví dụ: 66, 198, X)"
        required: true
        type: string
        default: "66"
      os_patch_level:
        description: "🛡️ Cấp độ bản vá (Ví dụ: 2022-01, lts)"
        required: true
        type: string
        default: "2022-01"
      revision:
        description: "📝 Revision (VD: r11, chỉ cần thiết cho 5.10)"
        required: false
        type: string
        default: "r11"

      # ==================== Cấu hình KernelSU ====================
      kernelsu_variant:
        description: "🧬 Biến thể KernelSU"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - MKSU
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "🌿 Nhánh KSU"
        required: true
        type: choice
        options:
          - Stable(Chuẩn)
          - Dev(Phát triển)
          - Other(Khác/Chỉ định)
        default: Stable(Chuẩn)

      # ==================== Cấu hình tùy chọn ====================
      version:
        description: "🏷️ Tên phiên bản tùy chỉnh (Tùy chọn)"
        required: false
        type: string
      build_time:
        description: "🕒 Giờ Build (Tùy chọn, N hoặc trống=UTC hiện tại)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== Công tắc tính năng ====================
      use_zram:
        description: "🗜️ Bật thuật toán tối ưu ZRAM"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "🛡️ Bật BBG chống brick"
        required: true
        type: boolean
        default: false
      use_kpm:
        description: "📦 Bật chức năng KPM"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "❄️ Bật trình điều khiển Re-Kernel"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "❌ Vô hiệu hóa SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "⚙️ Bật hỗ trợ OnePlus 8E"
        required: false
        type: boolean
        default: false

jobs:
  build-custom-kernel:
    name: "🔨 ${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      revision: ${{ inputs.revision || '' }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}