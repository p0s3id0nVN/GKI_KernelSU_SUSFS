name: 📱 Build Kernel - Android 14 (6.1)

# 🟢 Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # 🧬 Biến thể KernelSU được cố định là ReSukiSU
      kernelsu_branch:
        description: "🌿 Nhánh KSU (main/builtin/commit hash tùy chỉnh, để trống dùng mặc định)"
        required: false
        type: string
        default: ""
      version:
        description: "🏷️ Tên phiên bản tùy chỉnh (Tùy chọn)"
        required: false
        type: string
      build_time:
        description: "🕒 Thời gian build tùy chỉnh (Tùy chọn, N hoặc để trống = UTC hiện tại)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        description: "🗜️ Bật thuật toán tối ưu ZRAM"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "🛡️ Bật BBG chống brick"
        required: true
        type: boolean
        default: false
      use_kpm:
        description: "📦 Bật chức năng KPM"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "❄️ Bật trình điều khiển Re-Kernel"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "❌ Vô hiệu hóa SUSFS"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      # 🧬 Biến thể KernelSU được cố định là ReSukiSU
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: boolean
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      called_from_main:
        description: "🤖 Được gọi từ main.yml (Sử dụng nội bộ)"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a14-6-1:
    name: "🔨 6.1.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          
          - sub_level: "118"
            os_patch_level: "2025-01"
          
          - sub_level: "141"
            os_patch_level: "2025-07"
          
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android14"
      kernel_version: "6.1"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}

  # 📥 Chỉ chạy khi kích hoạt trực tiếp, bỏ qua nếu được gọi từ main.yml
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit