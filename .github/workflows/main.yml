# ========================================
# 🚀 LỐI VÀO CHÍNH BUILD KERNEL GKI
# ========================================
# Workflow này là điểm vào thống nhất của dự án, dùng để:
# 1. Build tất cả các phiên bản của Kernel GKI
# 2. Lấy KSU Manager mới nhất
# 3. Thu thập các file patch bị xung đột để debug
# 4. Tạo GitHub Release (Tùy chọn)
# ========================================

name: 🚀 Build Kernel (Main)

# 🟢 Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Kiểm soát đồng thời: Chỉ chạy một phiên bản trên cùng một nhánh, chạy mới sẽ hủy cái cũ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== CẤU HÌNH PHÁT HÀNH ====================
      release_type:
        description: "📦 Loại phát hành"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions

      # ==================== CẤU HÌNH KERNELSU ====================
      # 🧬 Biến thể KernelSU được cố định là ReSukiSU
      kernelsu_branch:
        description: "🌿 Nhánh KSU (main/builtin/commit hash tùy chỉnh, để trống dùng mặc định)"
        type: string
        default: ""
        required: false

      # ==================== CẤU HÌNH TÙY CHỌN ====================
      version:
        description: "🏷️ Tên phiên bản tùy chỉnh (Tùy chọn)"
        type: string
        default: ""
        required: false
      build_time:
        description: "🕒 Thời gian build tùy chỉnh (Tùy chọn, N hoặc để trống = UTC hiện tại)"
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
        required: false

      # ==================== CÔNG TẮC TÍNH NĂNG ====================
      use_zram:
        description: "🗜️ Bật thuật toán tối ưu ZRAM"
        type: boolean
        default: false
      use_bbg:
        description: "🛡️ Bật BBG chống brick"
        type: boolean
        default: false
      use_kpm:
        description: "📦 Bật tính năng KPM"
        type: boolean
        default: false
      use_rekernel:
        description: "❄️ Bật trình điều khiển Re-Kernel"
        type: boolean
        default: false
      cancel_susfs:
        description: "❌ Vô hiệu hóa SUSFS"
        type: boolean
        default: false

      # ==================== LỰA CHỌN PHIÊN BẢN BUILD ====================
      build_a12_5_10:
        description: "📱 Android 12 - 5.10"
        type: boolean
        default: false
      build_a13_5_15:
        description: "📱 Android 13 - 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "📱 Android 14 - 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "📱 Android 15 - 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "📱 Android 16 - 6.12"
        type: boolean
        default: false
      build_all:
        description: "🏗️ Build tất cả phiên bản"
        type: boolean
        default: true

      # ==================== TÙY CHỌN BOT PUSH ====================
      commit:
        description: "💬 Commit (sha hoặc mô tả)"
        type: string
        default: ""
        required: false
      change_log:
        description: "📝 Change Log (Tùy chọn, hỗ trợ nhiều dòng)"
        type: string
        default: ""
        required: false

jobs:
  # ==================== LẤY MANAGER ====================
  # 📥 Tải KernelSU Manager APK và Module SUSFS mới nhất
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit

  # ==================== Build Android 12 - 5.10 ====================
  build-a12-5-10:
    if: inputs.build_a12_5_10 || inputs.build_all
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Build Android 13 - 5.15 ====================
  build-a13-5-15:
    if: inputs.build_a13_5_15 || inputs.build_all
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Build Android 14 - 6.1 ====================
  build-a14-6-1:
    if: inputs.build_a14_6_1 || inputs.build_all
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Build Android 15 - 6.6 ====================
  build-a15-6-6:
    if: inputs.build_a15_6_6 || inputs.build_all
    uses: ./.github/workflows/kernel-a15-6-6.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Build Android 16 - 6.12 ====================
  build-a16-6-12:
    if: inputs.build_a16_6_12 || inputs.build_all
    uses: ./.github/workflows/kernel-a16-6-12.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== THU THẬP FILE PATCH XUNG ĐỘT ====================
  # Tổng hợp tất cả các file .rej từ các tác vụ build, giúp gỡ lỗi vấn đề patch
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12
    steps:
      - name: 📥 Tải xuống file xung đột
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: ⚙️ Xử lý file xung đột
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: 📤 Tải lên file xung đột đã gộp
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  # ==================== TẠO BẢN PHÁT HÀNH (RELEASE) ====================
  # Khi release_type không phải là Actions, sẽ tạo GitHub Release
  # Chỉ giới hạn chạy trên repo gốc, fork repo sẽ bỏ qua bước này
  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'coolzyd9107/GKI_KernelSU_SUSFS' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12

    # ==================== BIẾN MÔI TRƯỜNG ====================
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ==================== THIẾT LẬP TÊN HIỂN THỊ ====================
      # Tính toán trước các tên hiển thị để đơn giản hóa tham chiếu sau này
      - name: 🏷️ Thiết lập tên hiển thị
        run: |
          KSU_NAME="ReSukiSU"
          echo "KSU_NAME=$KSU_NAME" >> $GITHUB_ENV

          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV

          echo "LZ4_STATUS=${{ inputs.use_zram && 'Bật' || 'Tắt' }}" >> $GITHUB_ENV
          echo "BBG_STATUS=${{ inputs.use_bbg && 'Hỗ trợ' || 'Không hỗ trợ' }}" >> $GITHUB_ENV
          echo "KPM_LINE=${{ inputs.use_kpm && '-> KPM Hỗ trợ' || '' }}" >> $GITHUB_ENV
          echo "LZ4_SUFFIX=${{ inputs.use_zram && '、LZ4KD' || '' }}" >> $GITHUB_ENV

          echo "HOOK_TYPE=-> SUSFS Inline Hooks" >> $GITHUB_ENV
          echo "MOUNT_TYPE=-> Hỗ trợ Magic Mount" >> $GITHUB_ENV
          echo "KSU_SUFFIX=" >> $GITHUB_ENV

          if [ -n "${{ inputs.kernelsu_branch }}" ]; then
            echo "BRANCH_INFO=(${{ inputs.kernelsu_branch }})" >> $GITHUB_ENV
          else
            echo "BRANCH_INFO=Bản ổn định" >> $GITHUB_ENV
          fi

          echo "RELEASE_NAME=GKI Kernel: ${KSU_NAME}(${KSU_VER}) & SUSFS ${SUS_VER}" >> $GITHUB_ENV

      - name: ✅ Xác minh trạng thái build
        run: |
          failed=0
          check_build() {
            local selected="$1" job_name="$2" result="$3"
            if [[ "$selected" == "true" && "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Nhiệm vụ build đã chọn $job_name thất bại (Kết quả: $result)"
              failed=1
            fi
          }
          check_build "${{ inputs.build_a12_5_10 || inputs.build_all }}" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
          check_build "${{ inputs.build_a13_5_15 || inputs.build_all }}" "build-a13-5-15" "${{ needs.build-a13-5-15.result }}"
          check_build "${{ inputs.build_a14_6_1 || inputs.build_all }}" "build-a14-6-1" "${{ needs.build-a14-6-1.result }}"
          check_build "${{ inputs.build_a15_6_6 || inputs.build_all }}" "build-a15-6-6" "${{ needs.build-a15-6-6.result }}"
          check_build "${{ inputs.build_a16_6_12 || inputs.build_all }}" "build-a16-6-12" "${{ needs.build-a16-6-12.result }}"
          [[ "$failed" -ne 0 ]] && exit 1 || true

      - name: 📥 Checkout mã nguồn
        uses: actions/checkout@v6

      - name: 🌿 Xác định nhánh KSU
        if: inputs.kernelsu_branch != ''
        run: |
          BRANCH="${{ inputs.kernelsu_branch }}"
          echo "KSU_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: 🔍 Lấy thông tin commit KernelSU
        run: |
          REPO_URL="https://github.com/ReSukiSU/ReSukiSU.git"
          REPO_URL2="ReSukiSU/ReSukiSU"

          # Nếu người dùng nhập nhánh/commit tùy chỉnh, ưu tiên sử dụng
          if [ -n "${{ inputs.kernelsu_branch }}" ]; then
            BRANCH_INPUT="${{ inputs.kernelsu_branch }}"
            # Kiểm tra xem có phải là commit hash (40 ký tự hex) không
            if [[ "$BRANCH_INPUT" =~ ^[a-fA-F0-9]{40}$ ]]; then
              KSU_REF=$BRANCH_INPUT
              KSU_URL="https://github.com/$REPO_URL2/commit/$BRANCH_INPUT"
            else
              # Là tên nhánh, lấy commit mới nhất của nhánh đó
              COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH_INPUT | awk '{ print $1 }')
              KSU_REF=$COMMIT_HASH
              KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
            fi
          else
            # Bản ổn định: lấy tag mới nhất
            TAG=$(git ls-remote --tags --sort=-v:refname $REPO_URL | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1)
            KSU_REF=$TAG
            KSU_URL="https://github.com/$REPO_URL2/releases/tag/$TAG"
          fi

          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      - name: 🔍 Lấy thông tin commit SUSFS
        run: |
          GITLAB_OWNER="simonpunk"
          GITLAB_REPO="susfs4ksu"
          declare -A BRANCH_MAP=(
            ["gki_android12_5_10"]="gki-android12-5.10"
            ["gki_android13_5_15"]="gki-android13-5.15"
            ["gki_android14_6_1"]="gki-android14-6.1"
            ["gki_android15_6_6"]="gki-android15-6.6"
            ["gki_android16_6_12"]="gki-android16-6.12"
          )
          for var_name in "${!BRANCH_MAP[@]}"; do
            branch_name="${BRANCH_MAP[$var_name]}"
            COMMIT_HASH=$(git ls-remote https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO.git refs/heads/$branch_name | awk '{ print $1 }')
            if [[ -n "$COMMIT_HASH" ]]; then
              COMMIT_URL="https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO/-/commit/$COMMIT_HASH"
              echo "COMMIT_HASH_${var_name}=$COMMIT_HASH" >> "$GITHUB_ENV"
              echo "COMMIT_URL_${var_name}=$COMMIT_URL" >> "$GITHUB_ENV"
            fi
          done

      - name: 📝 Tạo Release Notes
        run: |
          cat > release_body.md << EOF
          ## 📦 Nội dung Bản phát hành / Release Contents

          **${{ env.KSU_NAME }}** + **SUSFS ${{ env.SUS_VER }}**${{ env.LZ4_SUFFIX }}

          ### ✨ Tính năng / Features

          | Thành phần / Component | Trạng thái / Status |
          |:---|:---|
          | ${{ env.KSU_NAME }} | ${{ env.KSU_SUFFIX }}${{ env.BRANCH_INFO }} |
          | SUSFS | ඞ ${{ env.SUS_VER }} |
          | Bản vá bảo mật BBG | ${{ env.BBG_STATUS }} |
          | LZ4KD & ONEPLUS_LZ4K | ${{ env.LZ4_STATUS }} |
          | LZ4 | v1.10.0 ${{ env.LZ4_STATUS }} |

          ${{ env.HOOK_TYPE }}
          ${{ env.MOUNT_TYPE }}
          ${{ env.KPM_LINE }} 

          > 💡 [Sửa lỗi vượt quyền Unicode zero-width](https://t.me/real5ec1cff/268) - Vui lòng sử dụng module Xposed

          ### 📥 Module khuyên dùng / Recommended Module

          - https://github.com/sidex15/ksu_module_susfs

          ---

          > [!IMPORTANT]
          > ### ⚠️ Tuyên bố Rủi ro / Risk Disclaimer
          >
          > Dự án này tích hợp nhiều **thành phần thượng nguồn được bảo trì liên tục**, do tần suất cập nhật và sự phụ thuộc lẫn nhau, **có thể xuất hiện các vấn đề sau**:
          >
          > - 🔄 Bootloop (Treo logo)
          > - 🐛 Lỗi chức năng hoặc hệ thống không ổn định
          >
          > **Trước khi flash, vui lòng đảm bảo:**
          > 1. Sao lưu file Boot image gốc, đảm bảo có thể khôi phục bất cứ lúc nào
          > 2. Ghi lại thời gian hiện tại để thuận tiện phân tích log
          >
          > ---
          >
          > This project integrates multiple **actively maintained upstream components**. Due to frequent updates and dependencies, **the following issues may occur**:
          >
          > - 🔄 Bootloop
          > - 🐛 Functional issues or system instability
          >
          > **Before flashing, please ensure:**
          > 1. Backup your stock boot image for recovery
          > 2. Note the current time for log analysis

          <details>
          <summary>📋 Hướng dẫn sau khi Flash / Post-Flash Guide</summary>

          #### ✅ Nếu khởi động bình thường / If Boot Successful

          Chúc mừng! Hãy tận hưởng Kernel mới của bạn nhé 🎉

          Congratulations! Enjoy your new kernel 🎉

          #### ❌ Nếu không thể khởi động / If Boot Failed

          1. Khôi phục lại Boot image gốc
          2. Sử dụng KernelSU Manager để xuất Kernel log
          3. Gửi log vào [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues) hoặc tham khảo ý kiến chuyên gia

          1. Restore stock boot image
          2. Extract kernel logs using KernelSU Manager
          3. Submit logs to [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues) or consult experts

          </details>

          ---

          <details>
          <summary>🔗 Thông tin Commit / Commit Info</summary>

          **KernelSU (ReSukiSU)**: [${{ env.KSU_REF }}](${{ env.KSU_URL }})

          **SUSFS4KSU**:
          - gki-android12-5.10: [${{ env.COMMIT_HASH_gki_android12_5_10 }}](${{ env.COMMIT_URL_gki_android12_5_10 }})
          - gki-android13-5.15: [${{ env.COMMIT_HASH_gki_android13_5_15 }}](${{ env.COMMIT_URL_gki_android13_5_15 }})
          - gki-android14-6.1: [${{ env.COMMIT_HASH_gki_android14_6_1 }}](${{ env.COMMIT_URL_gki_android14_6_1 }})
          - gki-android15-6.6: [${{ env.COMMIT_HASH_gki_android15_6_6 }}](${{ env.COMMIT_URL_gki_android15_6_6 }})
          - gki-android16-6.12: [${{ env.COMMIT_HASH_gki_android16_6_12 }}](${{ env.COMMIT_URL_gki_android16_6_12 }})

          </details>

          ---

          **LTO**: thin

          📂 Nhấn vào **Assets** bên dưới để tải về / Click **Assets** below to download
          EOF

      - name: 🏷️ Tạo Tag phiên bản
        run: |
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          if [ -z "$SUS_VERSION" ]; then
            echo "Cảnh báo: Không lấy được phiên bản SUSFS, sử dụng phiên bản mặc định"
            SUS_VERSION="1.0.0"
          fi

          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null | sed 's/-.*//' || echo "")

          if [ "$SUS_VERSION" = "$LATEST_TAG" ]; then
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          else
            LATEST_TAG="$SUS_VERSION-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

          git tag "$NEW_TAG"
          git push --tags

      - name: 📥 Tải xuống sản phẩm build
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: 🚀 Tạo GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$NEW_TAG" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_body.md \
            $PRERELEASE_FLAG

      - name: 📤 Tải lên Manager và Module SUSFS
        continue-on-error: true
        run: |
          echo "Đang chuẩn bị tải lên APK và Module SUSFS..."
          apk_count=$(find ./downloaded-artifacts -type f -name "*.apk" | wc -l || true)
          sus_count=$(find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" | wc -l || true)
          echo "APK files: ${apk_count}"
          echo "SUSFS files: ${sus_count}"
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done

      - name: 📤 Tải lên sản phẩm Kernel
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            echo "Đang tải lên $file..."
            gh release upload "$NEW_TAG" "$file"
          done

      - name: 📋 Tóm tắt Build
        run: |
          echo "## 🎉 Bản Release đã được tạo" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag / Nhãn**: $NEW_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Loại**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Liên kết**: https://github.com/$REPO_OWNER/$REPO_NAME/releases/tag/$NEW_TAG" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Gửi thông báo Telegram (Kênh)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          set -euo pipefail

          INPUT_COMMIT="${{ inputs.commit }}"
          INPUT_CHANGE_LOG="${{ inputs.change_log }}"

          TEXT=$(cat <<EOF
          <b>New GKI Release:</b>
          
          Branch: <code>${{ github.ref_name }}</code>
          Commit: ${INPUT_COMMIT}
          Tag: <code>${NEW_TAG}</code>
          
          Features: 
          <pre>ReSukiSU = true
          SuSFS = ${{ inputs.cancel_susfs && 'false' || 'true' }}
          BBG = ${{ inputs.use_bbg && 'true' || 'false' }}
          LZ4KD = ${{ inputs.use_zram && 'true' || 'false' }}
          Built-in KPM = ${{ inputs.use_kpm && 'true' || 'false' }}
          KPatch-Next Support = true</pre>
          Change Log: 
          <pre>${INPUT_CHANGE_LOG}
          </pre>
          
          Download: <a href="https://github.com/p0s3id0nVN/GKI_KernelSU_SUSFS/releases/tag/${NEW_TAG}">Click Here</a>

          Note: The "commit" here refers to ReSukiSU's commit, not this repository's.
          EOF
          )

          curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="${TEXT}"
            
