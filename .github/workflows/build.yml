# ========================================
# 🚀 QUY TRÌNH BUILD KERNEL GKI
# ========================================
# Workflow này chịu trách nhiệm biên dịch Kernel GKI Android, hỗ trợ nhiều biến thể KernelSU và SUSFS
# Được gọi thông qua workflow_call bởi các workflow khác, không kích hoạt thủ công trực tiếp
# ========================================

name: 🚀 Quy trình Build Kernel

# Tương thích Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      # ==================== Cấu hình cơ bản ====================
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string

      # ==================== Cấu hình KernelSU ====================
      ksu_variant:
        required: true
        type: string
      ksu_branch:
        required: true
        type: string

      # ==================== Cấu hình tùy chọn ====================
      version:
        required: false
        type: string
      revision:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== Công tắc tính năng ====================
      use_zram:
        required: true
        type: boolean
        default: true
      use_bbg:
        required: true
        type: boolean
        default: true
      use_kpm:
        required: true
        type: boolean
        default: true
      use_rekernel:
        required: false
        type: boolean
        default: false
      enable_susfs:
        required: true
        type: boolean
        default: true
      supp_op:
        required: false
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-ReSukiSU"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # ==================== Cấu hình biến môi trường ====================
    # ccache được dùng để tăng tốc độ biên dịch lại
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # ==================== Tóm tắt thông tin build ====================
      # In ra toàn bộ thông tin cấu hình hiện tại, thuận tiện cho debug
      - name: 📋 Tóm tắt thông tin build
        run: |
          echo "========================================"
          echo "       TÓM TẮT CẤU HÌNH BUILD KERNEL"
          echo "========================================"
          echo "Phiên bản Android  : ${{ inputs.android_version }}"
          echo "Phiên bản Kernel   : ${{ inputs.kernel_version }}"
          echo "Số phiên bản phụ   : ${{ inputs.sub_level }}"
          echo "Cấp độ bản vá      : ${{ inputs.os_patch_level }}"
          echo "Biến thể KSU       : ReSukiSU"
          echo "Nhánh KSU          : ${{ inputs.ksu_branch }}"
          echo "Thời gian build    : ${{ inputs.build_time }}"
          echo "Trạng thái SUSFS   : ${{ inputs.enable_susfs }}"
          echo "Tối ưu ZRAM        : ${{ inputs.use_zram }}"
          echo "Bản vá BBG         : ${{ inputs.use_bbg }}"
          echo "Tính năng KPM      : ${{ inputs.use_kpm }}"
          echo "Re-Kernel          : ${{ inputs.use_rekernel }}"
          echo "Stock Config       : Tự động phát hiện config/stock_defconfig"
          echo "========================================"

      # ==================== Dọn dẹp không gian đĩa ====================
      # Dung lượng mặc định của GitHub Actions có hạn, cần xóa bớt phần mềm không dùng
      - name: 🧹 Dọn dẹp không gian đĩa
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      # ==================== Checkout mã nguồn ====================
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      # ==================== Khởi tạo môi trường build ====================
      # Thiết lập các biến thư mục như mã nguồn, bản vá, tools
      - name: ⚙️ Khởi tạo môi trường build
        run: |
          # Định danh cấu hình
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          # Đưa các biến ra môi trường
          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig
          SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu
          KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches
          SUKISU_PATCHES=$GITHUB_WORKSPACE/SukiSU_patch
          ZZH_PATCHES=$GITHUB_WORKSPACE
          ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3
          ACTION_BUILD=$GITHUB_WORKSPACE/Action-Build
          AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool
          MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py
          UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py
          BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          EOF

          # Tải và thiết lập công cụ repo (để đồng bộ nguồn Android)
          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      # ==================== Hiển thị cấu hình file ====================
      - name: 📄 Hiển thị thông tin cấu hình
        run: |
          CONFIG_FILE="$GITHUB_WORKSPACE/config/config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "Đang tải file cấu hình: $CONFIG_FILE"
            cat "$CONFIG_FILE"
          fi

      # ==================== Cài đặt phụ thuộc ====================
      # Cài các công cụ và thư viện để biên dịch
      - name: 📦 Cài đặt thư viện phụ thuộc
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves

      # ==================== Cấu hình ccache ====================
      - name: 🚀 Cấu hình ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ==================== Khôi phục ccache ====================
      - name: ♻️ Khôi phục bộ nhớ đệm ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-

      # ==================== Cache Toolchain ====================
      - name: 🧰 Lưu bộ nhớ đệm Toolchain
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      # ==================== Tải Toolchain ====================
      - name: ⬇️ Tải xuống Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      # ==================== Tạo khóa ký ====================
      - name: 🔑 Tạo khóa chữ ký
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > $BOOT_SIGN_KEY_PATH

      # ==================== Cấu hình Git ====================
      - name: ⚙️ Cấu hình Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      # ==================== Clone Repo phụ thuộc ====================
      - name: 📥 Clone các repository phụ thuộc
        run: |
          ANYKERNEL_BRANCH="gki-2.0"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"

          echo "Clone AnyKernel3..."
          git clone https://github.com/coolzyd9107/AnyKernel3.git -b "master"
          rm -rf AnyKernel3/.git

          echo "Clone SUSFS (nhánh: $SUSFS_BRANCH)..."
          # ReSukiSU dùng SUSFS gốc của simonpunk
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"

          # Kiểm tra xem có bật tùy chỉnh commit không
          CONFIG_FILE="config/config"
          if [ -f "$CONFIG_FILE" ]; then
            CUSTOM_ENABLED=$(grep "^custom=" "$CONFIG_FILE" | cut -d'=' -f2)
            if [ "$CUSTOM_ENABLED" == "true" ]; then
              CUSTOM_COMMIT=$(grep "^${SUSFS_BRANCH}=" "$CONFIG_FILE" | cut -d'=' -f2)
              if [ -n "$CUSTOM_COMMIT" ]; then
                echo "Chuyển SUSFS sang commit tùy chỉnh: $CUSTOM_COMMIT"
                cd susfs4ksu
                git checkout "$CUSTOM_COMMIT"
                cd ..
              fi
            fi
          fi

          SUSFS_LATEST_COMMIT_DATE=$(git -C susfs4ksu log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
          echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          echo "Ngày commit mới nhất repo SUSFS: $SUSFS_LATEST_COMMIT_DATE"

          echo "Đang chuẩn bị file patch..."
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          echo "Sử dụng đường dẫn patch nội bộ: $ZZH_PATCHES"
          git clone https://github.com/Numbersf/Action-Build.git --depth=1

      # ==================== Khởi tạo và đồng bộ mã nguồn ====================
      - name: 🔄 Khởi tạo và đồng bộ mã nguồn kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          # Clone GCC (cho nhân 5.x)
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "Khởi tạo repo, nhánh: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          # Kiểm tra nhánh đã bị gỡ bỏ
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "Phát hiện nhánh bị gỡ bỏ (deprecated): $FORMATTED_BRANCH"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "REMOTE_BRANCH=$REMOTE_BRANCH" >> $GITHUB_ENV

      # ==================== Áp dụng Stock Config ====================
      - name: 🎭 Áp dụng ngụy trang Stock Config
        run: |
          # Nguồn stock_defconfig và đường dẫn đích
          STOCK_SRC="$GITHUB_WORKSPACE/config/stock_defconfig"
          STOCK_DST="$KERNEL_ROOT/common/arch/arm64/configs/stock_defconfig"

          if [ ! -f "$STOCK_SRC" ]; then
            echo "Không phát hiện $STOCK_SRC, bỏ qua ngụy trang Stock Config."
            exit 0
          fi

          mkdir -p "$(dirname "$STOCK_DST")"
          if ! cp "$STOCK_SRC" "$STOCK_DST"; then
            echo "::error::Copy stock_defconfig thất bại: $STOCK_SRC -> $STOCK_DST"
            exit 1
          fi
          echo "Đã copy stock_defconfig -> $STOCK_DST"

          NEW_RULE='$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE'
          OLD_RULE='$(obj)/config_data: $(KCONFIG_CONFIG) FORCE'
          TARGET_MAKEFILE="$KERNEL_ROOT/common/kernel/Makefile"

          if [ ! -f "$TARGET_MAKEFILE" ]; then
            echo "::error::Không tìm thấy $TARGET_MAKEFILE"
            exit 1
          fi

          if grep -qF "$NEW_RULE" "$TARGET_MAKEFILE"; then
            echo "Rule config_data đã chuẩn, bỏ qua."
          elif grep -qF "$OLD_RULE" "$TARGET_MAKEFILE"; then
            sed -i 's|\$(obj)/config_data: \$(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' "$TARGET_MAKEFILE"
            echo "Đã thay đổi rule config_data: $TARGET_MAKEFILE"
          else
            echo "::error::Không tìm thấy quy tắc: $OLD_RULE trong $TARGET_MAKEFILE"
            exit 1
          fi

      # ==================== Lấy phiên bản phụ thực tế ====================
      - name: 🏷️ Trích xuất số phiên bản phụ thực tế
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          echo "Bản phụ thực tế: $ACTUAL_SUBLEVEL"

      # ==================== Fix glibc 2.38 ====================
      - name: 🩹 Sửa lỗi tương thích glibc 2.38
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          RAW_SUB="${{ inputs.sub_level }}"
          [[ ! "$RAW_SUB" =~ ^[0-9]+$ ]] && CURRENT_SUB=99999 || CURRENT_SUB=$RAW_SUB

          NEEDS_FIX=false
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" && $CURRENT_SUB -le 186 ]] ||
             [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && $CURRENT_SUB -le 119 ]] ||
             [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" && $CURRENT_SUB -le 43 ]]; then
            NEEDS_FIX=true
          fi

          if [ "$NEEDS_FIX" = true ]; then
            GLIBC_VERSION=$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')
            if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n1)" = "2.38" ]; then
              echo "Tiến hành sửa lỗi tương thích glibc 2.38..."
              sed -i '/\$(Q)\$(MAKE) -C \$(SUBCMD_SRC) OUTPUT=\$(abspath \$(dir \$@))\/ \$(abspath \$@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile 2>/dev/null || true

              if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
                sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
              fi
            fi
          fi

      # ==================== Hỗ trợ OnePlus 8E ====================
      - name: 📱 Thêm hỗ trợ OnePlus 8E
        if: inputs.supp_op
        working-directory: ${{ env.KERNEL_ROOT }}/common/drivers
        run: |
          echo "Đang tải patch cho OnePlus 8E..."
          curl -LSs "https://github.com/zzh20188/GKI_KernelSU_SUSFS/raw/refs/heads/dev/hmbird_patch.c" -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile

      # ==================== Nhánh KSU ====================
      - name: 🌿 Xác định nhánh KernelSU
        id: ksu-branch
        run: |
          branch_input="${{ inputs.ksu_branch }}"

          # Nếu user có nhập custom branch/commit
          if [ -n "$branch_input" ]; then
            BRANCH="-s $branch_input"
            echo "Dùng nhánh/commit tùy chỉnh: $branch_input"
          else
            # ReSukiSU default là main
            BRANCH="-s main"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "KSU Branch: $BRANCH"

      # ==================== Thêm KernelSU ====================
      - name: 🧬 Thêm KernelSU
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "Đang thêm ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash $BRANCH

          if [ -d "KernelSU/.git" ]; then
            KSU_LATEST_COMMIT_DATE=$(git -C KernelSU log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "KSU_LATEST_COMMIT_DATE=$KSU_LATEST_COMMIT_DATE" >> $GITHUB_ENV
            echo "Ngày commit mới nhất repo KSU: $KSU_LATEST_COMMIT_DATE"
          else
            echo "KSU_LATEST_COMMIT_DATE=Không rõ" >> $GITHUB_ENV
          fi

      # ==================== Patch SUSFS ====================
      - name: 👻 Áp dụng bản vá SUSFS
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "Đang patch SUSFS..."
          SUSFS_VERSION=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' "$SUSFS4KSU/kernel_patches/include/linux/susfs.h" | awk '{print $3}' | tr -d '"' | sed 's/^v//')
          if [ -z "$SUSFS_VERSION" ]; then
            SUSFS_VERSION="2.0.0"
          fi
          if [ ! -d "$KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}" ]; then
            echo "Không tìm thấy wild/susfs_fix_patches/v${SUSFS_VERSION}, quay về v2.0.0"
            SUSFS_VERSION="2.0.0"
          fi
          echo "Bản fix SUSFS version: v${SUSFS_VERSION}"

          cp $SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp $SUSFS4KSU/kernel_patches/fs/* ./common/fs/
          cp $SUSFS4KSU/kernel_patches/include/linux/* ./common/include/linux/

          echo "ReSukiSU hỗ trợ SUSFS built-in"

          cd $KERNEL_ROOT/common
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi

          # Android 12 - 5.10 fix
          if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 209 ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a12-5.10/fdinfo.c.patch ./
              patch -p1 < fdinfo.c.patch || true
              sed -i 's/inotify_mark_user_mask(mark)/mark->mask \& IN_ALL_EVENTS/g' ./fs/notify/fdinfo.c
            fi
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a12-5.10/base.c.patch ./
              patch -p1 < base.c.patch || true
            fi
          fi
          

          # Android 13 - 5.15 fix
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/namespace.c.patch ./
              patch -p1 < namespace.c.patch || true
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/fdinfo.c.patch ./
              patch -p1 < fdinfo.c.patch || true
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/open.c.patch ./
              patch -p1 < open.c.patch || true
            fi
            if [[ "$CURRENT_SUB" -le 148 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi


          # Android 14 - 6.1 fix
          if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 141 || "$CURRENT_SUB" -ge 145 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a14-6.1/base.c.patch ./
              patch -p1 < base.c.patch || true
            fi
            if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
            fi
            if grep -q 'susfs_is_current_proc_umounted' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs.h>' ./fs/proc/base.c; then
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs.h>' ./fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 75 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
            if grep -q 'DEFAULT_KSU_MNT_ID\|susfs_mnt_id_ida' ./fs/namespace.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/namespace.c; then
              echo "Phát hiện namespace.c thiếu susfs_def.h, tiến hành chèn..."
              sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif' ./fs/namespace.c
              if ! grep -q 'extern bool susfs_is_current_ksu_domain' ./fs/namespace.c; then
                sed -i '/#include "internal.h"/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern bool susfs_is_sdcard_android_data_decrypted __read_mostly;\n\n#define CL_COPY_MNT_NS BIT(25)\n\nstatic DEFINE_IDA(susfs_mnt_id_ida);\nstatic DEFINE_IDA(susfs_mnt_group_ida);\n\n#endif' ./fs/namespace.c
              fi
            fi
          fi

          # Android 15 - 6.6 fix
          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -ge 98 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/base.c.patch ./
              patch -p1 < base.c.patch || true
            fi
            if grep -q 'AS_FLAGS_SUS_MAP\|susfs_is_current_proc_umounted' ./fs/proc/base.c && ! grep -qF 'susfs_def.h' ./fs/proc/base.c; then
              if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
              fi
              sed -i '/#include <linux\/dma-buf.h>/a #endif' ./fs/proc/base.c
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs_def.h>' ./fs/proc/base.c
              sed -i '/#include <linux\/dma-buf.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP' ./fs/proc/base.c
            fi
            if grep -q 'SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs.h>' ./fs/proc/base.c; then
              if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
              fi
              sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs.h>' ./fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 58 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/task_mmu.c.patch ./
              patch -p1 < task_mmu.c.patch || true
            fi
          fi

          # Android 16 - 6.12 fix
          if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
            SETUID_HOOK="$KERNEL_ROOT/common/drivers/kernelsu/setuid_hook.c"
            if [ -f "$SETUID_HOOK" ]; then
              sed -i 's/defined(CONFIG_KSU_MANUAL_HOOK))/!defined(CONFIG_KSU_SUSFS) \&\& defined(CONFIG_KSU_MANUAL_HOOK))/' "$SETUID_HOOK"
              echo "Đã sửa lỗi khai báo lặp setuid_hook.c"
            fi
            if grep -q 'susfs_is_current_proc_umounted' ./fs/exec.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/exec.c; then
              echo "Phát hiện exec.c thiếu susfs_def.h, tiến hành chèn..."
              sed -i '/#include <linux\/ksm\.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
            fi
          fi

      # ==================== Vá lỗi Unicode ====================
      - name: 🔤 Sửa lỗi vượt quyền Unicode
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          if [ "${{ inputs.kernel_version }}" = "5.10" ] || [ "${{ inputs.kernel_version }}" = "5.15" ]; then
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1-.patch" || true
          else
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1+.patch" || true
          fi

      # ==================== Nâng cấp LZ4 ====================
      - name: 🗜️ Cấu hình ngăn xếp bản vá ZRAM LZ4
        if: inputs.use_zram
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "Đang nâng cấp LZ4..."
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c

          cp -r $ZZH_PATCHES/zram/lz4/* ./lib/lz4/
          cp -r $ZZH_PATCHES/zram/include/linux/* ./include/linux/
          bash $ZZH_PATCHES/zram/apply_lz4_neon.sh

          if [ -f "fs/f2fs/Makefile" ] && ! grep -qF "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" "fs/f2fs/Makefile"; then
            echo "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" >> "fs/f2fs/Makefile"
          fi

          cp -r $SUKISU_PATCHES/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/lib/* ./lib/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/crypto/* ./crypto/
          cp -r $SUKISU_PATCHES/other/zram/lz4k_oplus ./lib/

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch ./
          if ! patch -p1 -F 3 < lz4kd.patch; then
            echo "::warning::lz4kd.patch lỗi, có thể đã được patch"
          fi

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch ./
          if ! patch -p1 -F 3 < lz4k_oplus.patch; then
            echo "::warning::lz4k_oplus.patch lỗi, có thể đã được patch"
          fi

      # ==================== Fix 6.6 WiFi/BT ====================
      - name: 📶 Sửa lỗi tương thích WiFi/Bluetooth 6.6 (Samsung + Xiaomi)
        if: inputs.kernel_version == '6.6'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          ensure_line_once() {
            local file="$1"
            local line="$2"
            if [ ! -f "$file" ]; then
              echo "::error::Tệp không tồn tại: $file"
              exit 1
            fi
            if ! grep -qF "$line" "$file"; then
              echo "$line" >> "$file"
            fi
          }

          GALAXY_SYMBOL_LIST="android/abi_gki_aarch64_galaxy"
          XIAOMI_SYMBOL_LIST="android/abi_gki_aarch64_xiaomi"
          DRIVERS_MAKEFILE="drivers/Makefile"
          MIN_KDP_SRC="$KERNEL_PATCHES/samsung/min_kdp/min_kdp.c"
          MIN_KDP_PATCH="$KERNEL_PATCHES/samsung/min_kdp/add-min_kdp-symbols.patch"
          MIN_KDP_DST="drivers/min_kdp.c"

          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_set_cred_non_rcu"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_dec_and_test"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_inc"

          if [ ! -f "$MIN_KDP_PATCH" ]; then
            echo "::error::Bản vá không tồn tại: $MIN_KDP_PATCH"
            exit 1
          fi
          if patch -p1 --dry-run < "$MIN_KDP_PATCH" >/dev/null 2>&1; then
            patch -p1 --no-backup-if-mismatch < "$MIN_KDP_PATCH"
          else
            echo "Bản vá min_kdp symbols đã tồn tại, bỏ qua."
          fi

          if [ ! -f "$MIN_KDP_SRC" ]; then
            echo "::error::Tệp không tồn tại: $MIN_KDP_SRC"
            exit 1
          fi
          cp "$MIN_KDP_SRC" "$MIN_KDP_DST"
          ensure_line_once "$DRIVERS_MAKEFILE" "obj-y += min_kdp.o"

          ensure_line_once "$XIAOMI_SYMBOL_LIST" "device_find_any_child"

      # ==================== Backup defconfig ====================
      - name: 💾 Sao lưu defconfig gốc
        run: cp "$DEFCONFIG" "$DEFCONFIG.orig"

      # ==================== Config ZRAM ====================
      - name: 🗜️ Cấu hình tùy chọn ZRAM
        if: inputs.use_zram
        run: |
          CONFIG_FILE="$DEFCONFIG"

          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            cat >> "$CONFIG_FILE" <<'EOF'
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_MODULE_SIG=n
          CONFIG_CRYPTO_LZO=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          EOF
          fi

          if [ "${{ inputs.kernel_version }}" != "6.6" ] && [ "${{ inputs.kernel_version }}" != "5.10" ]; then
            if grep -q "CONFIG_ZSMALLOC" "$CONFIG_FILE"; then
              sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$CONFIG_FILE"
            else
              echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            fi
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          if [ "${{ inputs.kernel_version }}" = "6.6" ]; then
            echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          if [ "${{ inputs.android_version }}" = "android14" ] || [ "${{ inputs.android_version }}" = "android15" ]; then
            sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' "$KERNEL_ROOT/common/modules.bzl"
          fi

          if grep -q "CONFIG_ZSMALLOC=y" "$CONFIG_FILE" && grep -q "CONFIG_ZRAM=y" "$CONFIG_FILE"; then
            cat "$ZZH_PATCHES/config/zram.config" >> "$CONFIG_FILE"
          fi

      # ==================== Add BBG ====================
      - name: 🛡️ Thêm bản vá chống brick BBG
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

      # ==================== Apply Re-Kernel ====================
      - name: ❄️ Áp dụng Re-Kernel
        if: inputs.use_rekernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Tích hợp Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/

          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
              help
                Enable Re-Kernel support via GKI Vendor Hooks.

          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF

          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF

          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi

          REKERNEL_H="common/drivers/rekernel/rekernel.h"
          VERSION_MACRO="KERNEL_$(echo "${{ inputs.kernel_version }}" | tr '.' '_')"
          if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
            sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
          fi

          sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
          grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c

          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"
          grep -q '^CONFIG_REKERNEL_NETWORK=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL_NETWORK=y" >> "$DEFCONFIG"

      # ==================== Config Kernel ====================
      - name: ⚙️ Cấu hình tùy chọn Kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 📦 Bật KPM
        if: inputs.use_kpm
        run: |
          if [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            echo "CONFIG_KPM=y" >> "$DEFCONFIG"
          fi

      # ==================== SUSFS Defconfig ====================
      - name: 👻 Thêm cấu hình SUSFS
        if: inputs.enable_susfs
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      # ==================== Kernel Name ====================
      - name: 🏷️ Cấu hình tên Kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ -f "build/build.sh" ]; then
            sed -i 's/-dirty//' ./common/scripts/setlocalversion
          else
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' ./common/BUILD.bazel
            sed -i '/kmi_symbol_list_strict_mode/d' ./common/BUILD.bazel
            rm -rf ./common/android/abi_gki_protected_exports_*
            sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl
          fi

          if [ -n "${{ inputs.version }}" ]; then
            CLEAN_VERSION=$(echo "${{ inputs.version }}" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//')
            
            case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
              "android14-6.1")  KMI_TAG="android14-11" ;;
              "android15-6.6")  KMI_TAG="android15-8" ;;
              "android16-6.12") KMI_TAG="android16-5" ;;
              *) KMI_TAG="${{ inputs.android_version }}" ;;
            esac
            
            if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
              KMI_LOCAL="-${KMI_TAG}${CLEAN_VERSION}"
              sed -i "\$s|echo \"\$res\"|echo \"${KMI_LOCAL}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
              sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI_LOCAL}\"/" ./common/arch/arm64/configs/gki_defconfig 2>/dev/null || true
            elif [ "${{ inputs.kernel_version }}" = "5.10" ] || [ "${{ inputs.kernel_version }}" = "5.15" ]; then
              sed -i "\$s|echo \"\$res\"|echo \"${CLEAN_VERSION}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
              sed -i '/^CONFIG_LOCALVERSION=/ s/="\([^"]*\)"/="'"$CLEAN_VERSION"'"/' ./common/arch/arm64/configs/gki_defconfig
            else
              SUFFIX="-${KMI_TAG}${CLEAN_VERSION}"
              perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'"/s' ./common/scripts/setlocalversion 2>/dev/null || true
            fi
          elif [ ! -f "build/build.sh" ]; then
            cd ./common
            BID="ab$((RANDOM % 90000000 + 10000000))"
            GHASH=$(git rev-parse --verify HEAD | cut -c1-13)
            case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
              "android14-6.1")  KMI_TAG="android14-11" ;;
              "android15-6.6")  KMI_TAG="android15-8" ;;
              "android16-6.12") KMI_TAG="android16-5" ;;
              *) KMI_TAG="${{ inputs.android_version }}" ;;
            esac

            if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
              KMI_LOCAL="-${KMI_TAG}-g${GHASH}-${BID}-4k"
              sed -i "\$s|echo \"\$res\"|echo \"${KMI_LOCAL}\"|" ./scripts/setlocalversion 2>/dev/null || true
              sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI_LOCAL}\"/" ./arch/arm64/configs/gki_defconfig 2>/dev/null || true
            else
              SUFFIX="-${KMI_TAG}-g${GHASH}-${BID}"
              perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'\$\{config_localversion\}"/s' ./scripts/setlocalversion 2>/dev/null || true
            fi
          fi

      # ==================== Build Time ====================
      - name: 🕒 Cài đặt thời gian build tùy chỉnh
        shell: bash
        run: |
          INPUT_TIME="${{ inputs.build_time }}"
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "N" && "$INPUT_TIME" != "n" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi

          echo "Sử dụng giờ build: $DATESTR"
          echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          f="$KERNEL_ROOT/common/scripts/mkcompile_h"
          if [ -f "$f" ]; then
            if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
              echo "Áp dụng patch mkcompile_h 5.x: $f"
              perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
            else
              echo "Áp dụng patch mkcompile_h 6.x: $f"
              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\\(.*?\\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          fi

      # ==================== Compile ====================
      - name: 🔨 Build Kernel (Tự động thử lại nếu lỗi)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: timeout
          command: |
            echo "::group::📝 Hướng dẫn"
            echo "Thường không có lỗi trừ khi repo KSU và SUSFS bất đồng bộ."
            echo "Việc lỗi ở bước này hoàn toàn thuộc về upstream, không phải do cách bạn build."
            echo "Hãy kiên nhẫn chờ các dev fix code nhé!"
            echo "::endgroup::"
            
            echo "Ngày commit KSU: ${KSU_LATEST_COMMIT_DATE}"
            echo "Ngày commit SUSFS: ${SUSFS_LATEST_COMMIT_DATE}"
            set -ex
            cd "$KERNEL_ROOT"

            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' ./common/build.config.gki.aarch64
            sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' ./common/build.config.gki.aarch64
            sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' ./common/build.config.gki.aarch64

            if [ -f "build/build.sh" ]; then
              LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang" || exit 1
              strings "out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist/Image" | grep 'Linux version'
            else
              FRAG="common/arch/arm64/configs/ksu.fragment"
              diff "$DEFCONFIG.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$FRAG" || true
              cp "$DEFCONFIG.orig" "$DEFCONFIG"
              echo "=== KSU Fragment ==="
              cat "$FRAG"
              echo "========================="
              FRAG_FLAG=""
              if [ -s "$FRAG" ]; then
                FRAG_FLAG="--defconfig_fragment=//common:arch/arm64/configs/ksu.fragment"
              fi
              LTO_FLAG="--lto=thin"
              if [ "${{ inputs.kernel_version }}" = "6.12" ]; then
                LTO_FLAG="--lto=none"
              fi
              tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast $LTO_FLAG $FRAG_FLAG //common:kernel_aarch64_dist || exit 1
              strings ./bazel-bin/common/kernel_aarch64/Image | grep 'Linux version'
            fi

            echo "Ngày commit KSU: ${KSU_LATEST_COMMIT_DATE}"
            echo "Ngày commit SUSFS: ${SUSFS_LATEST_COMMIT_DATE}"
            echo "Nếu lỗi, hãy chờ upstream đồng bộ!"
            
      # ==================== KPM Patch ====================
      - name: 📦 Áp dụng bản vá KPM (ReSukiSU)
        if: inputs.use_kpm
        run: |
          case "${{ inputs.android_version }}" in
            "android12"|"android13")
              if [ "${{ inputs.kernel_version }}" != "6.6" ]; then
                TARGET_PATH="$KERNEL_ROOT/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"
              fi
              ;;
            "android14"|"android15"|"android16")
              TARGET_PATH="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64/"
              ;;
          esac

          cp -r $SUKISU_PATCHES/kpm/patch_linux "$TARGET_PATH/patch"
          cd "$TARGET_PATH"
          chmod 777 patch
          ./patch
          rm -rf Image
          mv oImage Image

      # ==================== Prepare Image ====================
      - name: 💿 Chuẩn bị Boot Image
        run: |
          mkdir -p bootimgs

          if [ "${{ inputs.android_version }}" == "android12" ] || [ "${{ inputs.android_version }}" == "android13" ]; then
            SRC_DIR="$KERNEL_ROOT/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"
          else
            SRC_DIR="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64"
          fi

          cp "$SRC_DIR/Image" ./bootimgs/
          cp "$SRC_DIR/Image.lz4" ./bootimgs/
          cp "$SRC_DIR/Image" ./
          cp "$SRC_DIR/Image.lz4" ./
          gzip -n -k -f -9 ./Image > ./Image.gz

      # ==================== AnyKernel3 ====================
      - name: 📦 Đóng gói AnyKernel3
        run: |
          cd $ANYKERNEL3
          ZIP_NAME="${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3.zip"
          mv ../Image ./Image
          zip -r "../$ZIP_NAME" ./*

      # ==================== Boot Image A12 ====================
      - name: 💿 Build Boot Image (Android 12)
        if: inputs.android_version == 'android12'
        working-directory: bootimgs
        run: |
          GKI_URL=https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-${{ inputs.os_patch_level }}_${{ inputs.revision }}.zip
          FALLBACK_URL=https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-2023-01_r1.zip

          status=$(curl -sL -w "%{http_code}" "$GKI_URL" -o /dev/null)
          if [ "$status" = "200" ]; then
            curl -Lo gki-kernel.zip "$GKI_URL"
          else
            curl -Lo gki-kernel.zip "$FALLBACK_URL"
          fi

          unzip gki-kernel.zip && rm gki-kernel.zip
          $UNPACK_BOOTIMG --boot_img="$(pwd)/boot-5.10.img"

          gzip -n -k -f -9 ./Image > ./Image.gz

          $MKBOOTIMG --header_version 4 --kernel Image --output boot.img --ramdisk out/ramdisk --os_version 12.0.0 --os_patch_level "${{ inputs.os_patch_level }}"
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot.img

          $MKBOOTIMG --header_version 4 --kernel Image.gz --output boot-gz.img --ramdisk out/ramdisk --os_version 12.0.0 --os_patch_level "${{ inputs.os_patch_level }}"
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-gz.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-gz.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-gz.img

          $MKBOOTIMG --header_version 4 --kernel Image.lz4 --output boot-lz4.img --ramdisk out/ramdisk --os_version 12.0.0 --os_patch_level "${{ inputs.os_patch_level }}"
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-lz4.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-lz4.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-lz4.img

      # ==================== Boot Image A13+ ====================
      - name: 💿 Build Boot Image (Android 13+)
        if: inputs.android_version == 'android13' || inputs.android_version == 'android14' || inputs.android_version == 'android15' || inputs.android_version == 'android16'
        working-directory: bootimgs
        run: |
          gzip -n -k -f -9 ./Image > ./Image.gz

          $MKBOOTIMG --header_version 4 --kernel Image --output boot.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot.img

          $MKBOOTIMG --header_version 4 --kernel Image.gz --output boot-gz.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-gz.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-gz.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-gz.img

          $MKBOOTIMG --header_version 4 --kernel Image.lz4 --output boot-lz4.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-lz4.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-lz4.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-lz4.img

      # ==================== Rejects ====================
      - name: ⚠️ Thu thập file xung đột patch
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"

          mapfile -t REJS < <(find "$KERNEL_ROOT" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "Tìm thấy $REJ_COUNT file .rej"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV

          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#"$KERNEL_ROOT"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"

              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                cp "$ORIG" "${DEST%.rej}"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      # ==================== Upload Artifacts ====================
      - name: 📤 Upload Artifacts (Sản phẩm build)
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}
          path: |
            *AnyKernel3.zip
            *.img
          compression-level: 9

      - name: 📤 Upload file patch lỗi
        if: always() && env.REJ_COUNT > 0
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9